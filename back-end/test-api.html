<!DOCTYPE html>
<html>
<head>
    <title>Test Contact Form</title>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 50px auto; padding: 20px; }
        button { background: #ff7e00; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; }
        pre { background: #f0f0f0; padding: 10px; border-radius: 5px; margin-top: 20px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>🐺 Test Contact Form</h2>
    <button onclick="sendMessage()">Send Test Message</button>
    <div id="result"></div>

    <script>
        async function sendMessage() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Sending...</p>';
            
            try {
                const response = await fetch('http://localhost:3001/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: 'Test User',
                        email: 'test@example.com',
                        message: 'This is a test message from WolfPort!'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `<p class="success">✅ Success!</p><pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    resultDiv.innerHTML = `<p class="error">❌ Error: ${data.error}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">❌ Connection error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
