<!DOCTYPE html>
<html>
<head>
    <title>Test Chat API</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        button { background: #ff7e00; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; margin: 5px; }
        pre { background: #f0f0f0; padding: 10px; border-radius: 5px; margin-top: 20px; white-space: pre-wrap; }
        input { width: 70%; padding: 10px; margin: 10px 0; }
        .question-buttons { margin: 20px 0; }
    </style>
</head>
<body>
    <h2>🐺 Test Gemini AI Chatbot</h2>
    
    <div class="question-buttons">
        <button onclick="askQuestion('Who is Mugisha Isihaqa?')">Who is wolfras?</button>
        <button onclick="askQuestion('What is the capital of Rwanda?')">Capital of Rwanda</button>
        <button onclick="askQuestion('What projects has wolfras built?')">Projects</button>
        <button onclick="askQuestion('Hello')">Say Hello</button>
    </div>
    
    <div>
        <input type="text" id="question" placeholder="Ask anything..." size="40">
        <button onclick="askCustom()">Ask</button>
    </div>
    
    <div id="result"></div>

    <script>
        async function askQuestion(question) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>🤔 Thinking...</p>';
            
            try {
                const response = await fetch('http://localhost:3001/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [{ role: 'user', content: question }]
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div style="background: #1a1a1a; color: white; padding: 15px; border-radius: 8px; margin-top: 10px;">
                            <p><strong>📝 Question:</strong> ${question}</p>
                            <p><strong>🤖 WolfrasAI:</strong></p>
                            <p style="white-space: pre-wrap;">${data.content}</p>
                            <p style="font-size: 12px; color: #888; margin-top: 10px;">✨ Powered by Gemini AI</p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `<p class="error">❌ Error: ${data.error}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">❌ Connection error: ${error.message}</p>`;
            }
        }
        
        function askCustom() {
            const question = document.getElementById('question').value;
            if (question) askQuestion(question);
        }
        
        // Allow Enter key
        document.getElementById('question').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') askCustom();
        });
    </script>
</body>
</html>
